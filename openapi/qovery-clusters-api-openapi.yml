            description: Unit is in GB. The disk size to be used for the node configuration
          disk_iops:
            type: integer
            example: 7800
            minimum: 3000
            maximum: 16000
            description: Unit is operation/seconds. The disk IOPS to be used for the node configuration
          disk_throughput:
            type: integer
            example: 255
            minimum: 125
            maximum: 1000
            description: Unit is in MB/s. The disk thoughput to be used for the node configuration
          instance_type:
            type: string
