components:
  schemas:
    AwsCredentialsRequest:
      oneOf:
      - $ref: '#/components/schemas/AwsRoleCredentialsRequest'
      - $ref: '#/components/schemas/AwsStaticCredentialsRequest'
      - $ref: '#/components/schemas/EksAnywhereVsphereRoleCredentialsRequest'
      - $ref: '#/components/schemas/EksAnywhereVsphereStaticCredentialsRequest'
      discriminator:
        propertyName: type
        mapping:
          AWS_ROLE: '#/components/schemas/AwsRoleCredentialsRequest'
          AWS_STATIC: '#/components/schemas/AwsStaticCredentialsRequest'
          EKS_ANYWHERE_VSPHERE_ROLE: '#/components/schemas/EksAnywhereVsphereRoleCredentialsRequest'
          EKS_ANYWHERE_VSPHERE_STATIC: '#/components/schemas/EksAnywhereVsphereStaticCredentialsRequest'
    GenericClusterCredentials:
      title: GenericClusterCredentials
      x-stoplight:
        id: gtibx4nzrvxm9
      type: object
      required:
      - id
      - name
      - object_type
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        object_type:
          enum:
          - OTHER
    GcpStaticClusterCredentials:
      title: GcpStaticClusterCredentials
      x-stoplight:
        id: qtvaepejqookw
      type: object
      required:
      - id
      - name
      - object_type
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        object_type:
          enum:
          - GCP
    AzureStaticClusterCredentials:
      title: AzureStaticClusterCredentials
      x-stoplight:
        id: wo7v4e4c0jlfu
      type: object
      required:
      - id
      - name
      - azure_subscription_id
      - azure_tenant_id
      - object_type
      - azure_application_id
      - azure_application_object_id
      properties:
        id:
          type: string
          x-stoplight:
            id: 7qy00mrnhmclv
          format: uuid
        name:
          type: string
          x-stoplight:
            id: f5c1wc467emz3
        azure_subscription_id:
          type: string
          x-stoplight:
            id: x0s5zbj6l1yx0
        azure_tenant_id:
          type: string
          x-stoplight:
            id: ygjwz6uqfexsc
        object_type:
          x-stoplight:
            id: 8oodrxjznyahm
          enum:
          - AZURE
        azure_application_id:
          type: string
          x-stoplight:
            id: wc0e8cqceyopu
        azure_application_object_id:
          type: string
          x-stoplight:
            id: q20e71qkfsk1k
    GcpCredentialsRequest:
      type: object
      required:
      - name
      - gcp_credentials
      properties:
        name:
          type: string
        gcp_credentials:
          type: string
    ClusterCredentials:
      oneOf:
      - $ref: '#/components/schemas/AwsStaticClusterCredentials'
      - $ref: '#/components/schemas/ScalewayClusterCredentials'
      - $ref: '#/components/schemas/GenericClusterCredentials'
      - $ref: '#/components/schemas/AwsRoleClusterCredentials'
      - $ref: '#/components/schemas/EksAnywhereVsphereClusterCredentials'
      - $ref: '#/components/schemas/AzureStaticClusterCredentials'
      - $ref: '#/components/schemas/GcpStaticClusterCredentials'
      discriminator:
        propertyName: object_type
        mapping:
          AWS: '#/components/schemas/AwsStaticClusterCredentials'
          AWS_ROLE: '#/components/schemas/AwsRoleClusterCredentials'
          EKS_ANYWHERE_VSPHERE: '#/components/schemas/EksAnywhereVsphereClusterCredentials'
          SCW: '#/components/schemas/ScalewayClusterCredentials'
          OTHER: '#/components/schemas/GenericClusterCredentials'
          AZURE: '#/components/schemas/AzureStaticClusterCredentials'
          GCP: '#/components/schemas/GcpStaticClusterCredentials'
    OnPremiseCredentialsRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
    AzureCredentialsRequest:
      title: AzureCredentialsRequest
      x-stoplight:
        id: gjzlt9ldnn7ip
      type: object
      required:
      - name
      - azure_subscription_id
      - azure_tenant_id
      properties:
        name:
          type: string
          x-stoplight:
            id: ywkpnhxrygsf4
        azure_subscription_id:
          type: string
          x-stoplight:
            id: 4py3o45wxewvh
        azure_tenant_id:
          type: string
          x-stoplight:
            id: u776tz269mjb0
    AwsStaticClusterCredentials:
      x-stoplight:
        id: s0aosg7la96hp
      title: AwsStaticClusterCredentials
      type: object
      required:
      - id
      - name
      - access_key_id
      - object_type
      properties:
        id:
          type: string
          x-stoplight:
            id: en79y0yc76xhp
          format: uuid
        name:
          type: string
          x-stoplight:
            id: mx0mwek4ubieo
        access_key_id:
          type: string
          x-stoplight:
            id: 6g20j0ggu8nqc
        object_type:
          x-stoplight:
            id: ravczabg8e2sp
          enum:
          - AWS
    EksAnywhereVsphereRoleCredentialsRequest:
      type: object
      required:
      - type
      - name
      - vsphere_user
      - vsphere_password
      - role_arn
      properties:
        type:
          type: string
          enum:
          - EKS_ANYWHERE_VSPHERE_ROLE
        name:
          type: string
        vsphere_user:
          type: string
        vsphere_password:
          type: string
        role_arn:
          type: string
    AwsStaticCredentialsRequest:
      required:
      - type
      - name
      - access_key_id
      - secret_access_key
      properties:
        type:
          type: string
          enum:
          - AWS_STATIC
        name:
          type: string
        access_key_id:
          type: string
        secret_access_key:
          type: string
      x-stoplight:
        id: l0s0fv735914p
      type: object
    EksAnywhereVsphereClusterCredentials:
      title: EksAnywhereVsphereClusterCredentials
      type: object
      required:
      - id
      - name
      - vsphere_user
      - object_type
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        vsphere_user:
          type: string
        access_key_id:
          type: string
          nullable: true
        role_arn:
          type: string
          nullable: true
        object_type:
          enum:
          - EKS_ANYWHERE_VSPHERE
    AwsRoleCredentialsRequest:
      x-stoplight:
        id: jn74pfty2eq7c
      type: object
      required:
      - type
      - name
      - role_arn
      properties:
        type:
          type: string
          enum:
          - AWS_ROLE
        name:
          type: string
        role_arn:
          type: string
          x-stoplight:
            id: my3ry04bqibxp
    ClusterCredentialsResponseList:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/ClusterCredentials'
    ScalewayCredentialsRequest:
      type: object
      required:
      - name
      - scaleway_access_key
      - scaleway_secret_key
      - scaleway_project_id
      - scaleway_organization_id
      properties:
        name:
          type: string
        scaleway_access_key:
          type: string
