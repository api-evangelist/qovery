  - type: http
    namespace: qovery-application-secret
    baseUri: https://api.qovery.com
    description: Qovery API — Application Secret business capability. Self-contained, no shared references.
    resources:
    - name: application-applicationId-secret
      path: /application/{applicationId}/secret
      operations:
      - name: listapplicationsecrets
        method: GET
        description: List application secrets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createapplicationsecret
        method: POST
        description: Add a secret to the application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: application-applicationId-secret-secretId
      path: /application/{applicationId}/secret/{secretId}
      operations:
      - name: deleteapplicationsecret
        method: DELETE
        description: Delete a secret from an application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: editapplicationsecret
        method: PUT
        description: Edit a secret belonging to the application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: application-applicationId-secret-secretId-alias
      path: /application/{applicationId}/secret/{secretId}/alias
      operations:
      - name: createapplicationsecretalias
        method: POST
        description: Create a secret alias at the application level
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: application-applicationId-secret-secretId-override
      path: /application/{applicationId}/secret/{secretId}/override
      operations:
      - name: createapplicationsecretoverride
        method: POST
        description: Create a secret override at the application level
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.QOVERY_API_KEY}}'
  exposes:
  - type: rest
    namespace: qovery-application-secret-rest
    port: 8080
    description: REST adapter for Qovery API — Application Secret. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/application/{applicationid}/secret
      name: application-applicationid-secret
      description: REST surface for application-applicationId-secret.
      operations:
      - method: GET
        name: listapplicationsecrets
        description: List application secrets
        call: qovery-application-secret.listapplicationsecrets
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapplicationsecret
        description: Add a secret to the application
        call: qovery-application-secret.createapplicationsecret
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/application/{applicationid}/secret/{secretid}
      name: application-applicationid-secret-secretid
      description: REST surface for application-applicationId-secret-secretId.
      operations:
      - method: DELETE
        name: deleteapplicationsecret
        description: Delete a secret from an application
        call: qovery-application-secret.deleteapplicationsecret
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: editapplicationsecret
        description: Edit a secret belonging to the application
        call: qovery-application-secret.editapplicationsecret
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/application/{applicationid}/secret/{secretid}/alias
      name: application-applicationid-secret-secretid-alias
      description: REST surface for application-applicationId-secret-secretId-alias.
      operations:
      - method: POST
        name: createapplicationsecretalias
        description: Create a secret alias at the application level
        call: qovery-application-secret.createapplicationsecretalias
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/application/{applicationid}/secret/{secretid}/override
      name: application-applicationid-secret-secretid-override
      description: REST surface for application-applicationId-secret-secretId-override.
      operations:
      - method: POST
        name: createapplicationsecretoverride
        description: Create a secret override at the application level
        call: qovery-application-secret.createapplicationsecretoverride
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
