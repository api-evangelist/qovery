naftiko: 1.0.0-alpha2
info:
  label: Qovery API — Application Secret
  description: 'Qovery API — Application Secret. 6 operations. Lead operation: List application secrets. Self-contained Naftiko
    capability covering one Qovery business surface.'
  tags:
  - Qovery
  - Application Secret
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QOVERY_API_KEY: QOVERY_API_KEY
capability:
