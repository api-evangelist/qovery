    description: Qovery API — Project Main Calls business capability. Self-contained, no shared references.
    resources:
    - name: project-projectId
      path: /project/{projectId}
      operations:
      - name: getproject
        method: GET
        description: Get project by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: editproject
        method: PUT
        description: Edit a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteproject
        method: DELETE
        description: Delete a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.QOVERY_API_KEY}}'
