      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: qovery-project-main-calls.editproject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-project
      description: Delete a project
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: qovery-project-main-calls.deleteproject
      outputParameters:
      - type: object
        mapping: $.
