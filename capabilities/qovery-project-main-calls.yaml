    namespace: qovery-project-main-calls-rest
    port: 8080
    description: REST adapter for Qovery API — Project Main Calls. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/project/{projectid}
      name: project-projectid
      description: REST surface for project-projectId.
      operations:
      - method: GET
        name: getproject
        description: Get project by ID
        call: qovery-project-main-calls.getproject
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: editproject
        description: Edit a project
        call: qovery-project-main-calls.editproject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteproject
        description: Delete a project
        call: qovery-project-main-calls.deleteproject
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: qovery-project-main-calls-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qovery API — Project Main Calls. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-project-id
      description: Get project by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qovery-project-main-calls.getproject
      outputParameters:
      - type: object
        mapping: $.
