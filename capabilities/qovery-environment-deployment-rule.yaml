      name: environment-environmentid-deploymentrule
      description: REST surface for environment-environmentId-deploymentRule.
      operations:
      - method: GET
        name: getenvironmentdeploymentrule
        description: Get environment deployment rule
        call: qovery-environment-deployment-rule.getenvironmentdeploymentrule
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/environment/{environmentid}/deploymentrule/{deploymentruleid}
      name: environment-environmentid-deploymentrule-deploymentruleid
      description: REST surface for environment-environmentId-deploymentRule-deploymentRuleId.
      operations:
      - method: PUT
        name: editenvironmentdeploymentrule
        description: Edit an environment deployment rule
        call: qovery-environment-deployment-rule.editenvironmentdeploymentrule
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
