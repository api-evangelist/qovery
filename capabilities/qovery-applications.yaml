      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qovery-applications.listapplication
      outputParameters:
      - type: object
        mapping: $.
    - name: create-application
      description: Create an application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-applications.createapplication
      with:
        body: tools.body
