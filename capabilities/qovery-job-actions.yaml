naftiko: 1.0.0-alpha2
info:
  label: Qovery API — Job Actions
  description: 'Qovery API — Job Actions. 5 operations. Lead operation: Clean a failed job. Self-contained Naftiko capability
    covering one Qovery business surface.'
  tags:
  - Qovery
  - Job Actions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QOVERY_API_KEY: QOVERY_API_KEY
capability:
  consumes:
  - type: http
    namespace: qovery-job-actions
    baseUri: https://api.qovery.com
    description: Qovery API — Job Actions business capability. Self-contained, no shared references.
    resources:
    - name: job-jobId-cleanFailedJob
      path: /job/{jobId}/cleanFailedJob
      operations:
      - name: cleanfailedjob
        method: POST
        description: Clean a failed job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: job-jobId-deploy
      path: /job/{jobId}/deploy
      operations:
      - name: deployjob
        method: POST
        description: Deploy job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: forceEvent
          in: query
          type: string
          description: 'When filled, it indicates the target event to be deployed.  '
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: job-jobId-redeploy
      path: /job/{jobId}/redeploy
      operations:
      - name: redeployjob
        method: POST
        description: Redeploy job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: forceEvent
          in: query
          type: string
          description: 'When filled, it indicates the target event to be deployed.  '
    - name: job-jobId-stop
      path: /job/{jobId}/stop
      operations:
      - name: stopjob
        method: POST
        description: Stop job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: job-jobId-uninstall
      path: /job/{jobId}/uninstall
      operations:
      - name: uninstalljob
        method: POST
        description: Uninstall job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.QOVERY_API_KEY}}'
  exposes:
  - type: rest
    namespace: qovery-job-actions-rest
    port: 8080
    description: REST adapter for Qovery API — Job Actions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/job/{jobid}/cleanfailedjob
      name: job-jobid-cleanfailedjob
      description: REST surface for job-jobId-cleanFailedJob.
      operations:
      - method: POST
        name: cleanfailedjob
        description: Clean a failed job
        call: qovery-job-actions.cleanfailedjob
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/job/{jobid}/deploy
      name: job-jobid-deploy
      description: REST surface for job-jobId-deploy.
      operations:
      - method: POST
        name: deployjob
        description: Deploy job
        call: qovery-job-actions.deployjob
        with:
          forceEvent: rest.forceEvent
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/job/{jobid}/redeploy
      name: job-jobid-redeploy
      description: REST surface for job-jobId-redeploy.
      operations:
      - method: POST
        name: redeployjob
        description: Redeploy job
        call: qovery-job-actions.redeployjob
        with:
          forceEvent: rest.forceEvent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/job/{jobid}/stop
      name: job-jobid-stop
      description: REST surface for job-jobId-stop.
      operations:
      - method: POST
        name: stopjob
        description: Stop job
        call: qovery-job-actions.stopjob
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/job/{jobid}/uninstall
      name: job-jobid-uninstall
      description: REST surface for job-jobId-uninstall.
      operations:
      - method: POST
        name: uninstalljob
        description: Uninstall job
        call: qovery-job-actions.uninstalljob
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: qovery-job-actions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qovery API — Job Actions. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: clean-failed-job
      description: Clean a failed job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-job-actions.cleanfailedjob
      outputParameters:
      - type: object
        mapping: $.
    - name: deploy-job
      description: Deploy job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-job-actions.deployjob
      with:
        forceEvent: tools.forceEvent
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: redeploy-job
      description: Redeploy job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-job-actions.redeployjob
      with:
        forceEvent: tools.forceEvent
      outputParameters:
      - type: object
        mapping: $.
    - name: stop-job
      description: Stop job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-job-actions.stopjob
      outputParameters:
      - type: object
        mapping: $.
    - name: uninstall-job
      description: Uninstall job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-job-actions.uninstalljob
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
