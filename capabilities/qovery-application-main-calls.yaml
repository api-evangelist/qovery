      name: application-applicationid
      description: REST surface for application-applicationId.
      operations:
      - method: GET
        name: getapplication
        description: Get application by ID
        call: qovery-application-main-calls.getapplication
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: editapplication
        description: Edit application
        call: qovery-application-main-calls.editapplication
        with:
          body: rest.body
        outputParameters:
        - type: object
