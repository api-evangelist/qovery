      path: /application/{applicationId}
      operations:
      - name: getapplication
        method: GET
        description: Get application by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: editapplication
        method: PUT
        description: Edit application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteapplication
        method: DELETE
        description: Delete application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
