    baseUri: https://api.qovery.com
    description: Qovery API — Job Main Calls business capability. Self-contained, no shared references.
    resources:
    - name: job-jobId
      path: /job/{jobId}
      operations:
      - name: getjob
        method: GET
        description: Get job by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: editjob
        method: PUT
        description: Edit job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletejob
        method: DELETE
        description: Delete job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: job-jobId-commit
      path: /job/{jobId}/commit
      operations:
      - name: listjobcommit
        method: GET
        description: List last job commits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: job-jobId-status
      path: /job/{jobId}/status
      operations:
      - name: getjobstatus
        method: GET
        description: Get job status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
