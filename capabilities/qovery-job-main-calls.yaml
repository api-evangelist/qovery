      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: qovery-job-main-calls.deletejob
      outputParameters:
      - type: object
        mapping: $.
    - name: list-last-job-commits
      description: List last job commits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qovery-job-main-calls.listjobcommit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-job-status
      description: Get job status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qovery-job-main-calls.getjobstatus
      outputParameters:
      - type: object
        mapping: $.
