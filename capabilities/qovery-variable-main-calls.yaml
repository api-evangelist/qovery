naftiko: 1.0.0-alpha2
info:
  label: Qovery API — Variable Main Calls
  description: 'Qovery API — Variable Main Calls. 7 operations. Lead operation: List variables. Self-contained Naftiko capability
    covering one Qovery business surface.'
  tags:
  - Qovery
  - Variable Main Calls
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QOVERY_API_KEY: QOVERY_API_KEY
capability:
  consumes:
  - type: http
    namespace: qovery-variable-main-calls
    baseUri: https://api.qovery.com
    description: Qovery API — Variable Main Calls business capability. Self-contained, no shared references.
    resources:
    - name: variable
      path: /variable
      operations:
      - name: listvariables
        method: GET
        description: List variables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parent_id
          in: query
          type: string
          description: it filters the list by returning only the variables accessible by the selected parent_id. This field
            shall contain the id of a project, environment or service d
          required: true
        - name: scope
          in: query
          type: string
          description: the type of the parent_id (application, project, environment etc..).
          required: true
        - name: is_secret
          in: query
          type: boolean
      - name: createvariable
        method: POST
        description: Create a variable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: variable-import
      path: /variable/import
      operations:
      - name: importenvironmentvariables
        method: POST
        description: Import variables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: service_id
          in: query
          type: string
          description: service id
          required: true
        - name: service_type
          in: query
          type: string
          description: service type
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: variable-variableId
      path: /variable/{variableId}
      operations:
      - name: deletevariable
        method: DELETE
        description: Delete a variable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: editvariable
        method: PUT
        description: Edit a variable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: variable-variableId-alias
      path: /variable/{variableId}/alias
      operations:
      - name: createvariablealias
        method: POST
        description: Create a variable alias
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: variable-variableId-override
      path: /variable/{variableId}/override
      operations:
      - name: createvariableoverride
        method: POST
        description: Create a variable override
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.QOVERY_API_KEY}}'
  exposes:
  - type: rest
    namespace: qovery-variable-main-calls-rest
    port: 8080
    description: REST adapter for Qovery API — Variable Main Calls. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/variable
      name: variable
      description: REST surface for variable.
      operations:
      - method: GET
        name: listvariables
        description: List variables
        call: qovery-variable-main-calls.listvariables
        with:
          parent_id: rest.parent_id
          scope: rest.scope
          is_secret: rest.is_secret
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createvariable
        description: Create a variable
        call: qovery-variable-main-calls.createvariable
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/variable/import
      name: variable-import
      description: REST surface for variable-import.
      operations:
      - method: POST
        name: importenvironmentvariables
        description: Import variables
        call: qovery-variable-main-calls.importenvironmentvariables
        with:
          service_id: rest.service_id
          service_type: rest.service_type
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/variable/{variableid}
      name: variable-variableid
      description: REST surface for variable-variableId.
      operations:
      - method: DELETE
        name: deletevariable
        description: Delete a variable
        call: qovery-variable-main-calls.deletevariable
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: editvariable
        description: Edit a variable
        call: qovery-variable-main-calls.editvariable
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/variable/{variableid}/alias
      name: variable-variableid-alias
      description: REST surface for variable-variableId-alias.
      operations:
      - method: POST
        name: createvariablealias
        description: Create a variable alias
        call: qovery-variable-main-calls.createvariablealias
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/variable/{variableid}/override
      name: variable-variableid-override
      description: REST surface for variable-variableId-override.
      operations:
      - method: POST
        name: createvariableoverride
        description: Create a variable override
        call: qovery-variable-main-calls.createvariableoverride
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: qovery-variable-main-calls-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qovery API — Variable Main Calls. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-variables
      description: List variables
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qovery-variable-main-calls.listvariables
      with:
        parent_id: tools.parent_id
        scope: tools.scope
        is_secret: tools.is_secret
      outputParameters:
      - type: object
        mapping: $.
    - name: create-variable
      description: Create a variable
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-variable-main-calls.createvariable
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: import-variables
      description: Import variables
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-variable-main-calls.importenvironmentvariables
      with:
        service_id: tools.service_id
        service_type: tools.service_type
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-variable
      description: Delete a variable
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: qovery-variable-main-calls.deletevariable
      outputParameters:
      - type: object
        mapping: $.
    - name: edit-variable
      description: Edit a variable
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: qovery-variable-main-calls.editvariable
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-variable-alias
      description: Create a variable alias
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-variable-main-calls.createvariablealias
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-variable-override
      description: Create a variable override
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-variable-main-calls.createvariableoverride
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
