naftiko: 1.0.0-alpha2
info:
  label: Qovery API — Terraform Resources
  description: 'Qovery API — Terraform Resources. 1 operations. Lead operation: Get terraform resources from latest deployment.
    Self-contained Naftiko capability covering one Qovery business surface.'
  tags:
  - Qovery
  - Terraform Resources
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QOVERY_API_KEY: QOVERY_API_KEY
capability:
  consumes:
  - type: http
    namespace: qovery-terraform-resources
    baseUri: https://api.qovery.com
    description: Qovery API — Terraform Resources business capability. Self-contained, no shared references.
    resources:
    - name: terraform-terraformId-terraformResources
      path: /terraform/{terraformId}/terraformResources
      operations:
      - name: getterraformresources
        method: GET
        description: Get terraform resources from latest deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.QOVERY_API_KEY}}'
  exposes:
  - type: rest
    namespace: qovery-terraform-resources-rest
    port: 8080
    description: REST adapter for Qovery API — Terraform Resources. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/terraform/{terraformid}/terraformresources
      name: terraform-terraformid-terraformresources
      description: REST surface for terraform-terraformId-terraformResources.
      operations:
      - method: GET
        name: getterraformresources
        description: Get terraform resources from latest deployment
        call: qovery-terraform-resources.getterraformresources
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: qovery-terraform-resources-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qovery API — Terraform Resources. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-terraform-resources-latest-deployment
      description: Get terraform resources from latest deployment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qovery-terraform-resources.getterraformresources
      outputParameters:
      - type: object
        mapping: $.
