naftiko: 1.0.0-alpha2
info:
  label: Qovery API — Helm Main Calls
  description: 'Qovery API — Helm Main Calls. 7 operations. Lead operation: Get helm by ID. Self-contained Naftiko capability
    covering one Qovery business surface.'
  tags:
  - Qovery
  - Helm Main Calls
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QOVERY_API_KEY: QOVERY_API_KEY
capability:
  consumes:
  - type: http
    namespace: qovery-helm-main-calls
    baseUri: https://api.qovery.com
    description: Qovery API — Helm Main Calls business capability. Self-contained, no shared references.
    resources:
    - name: helm-helmId
      path: /helm/{helmId}
      operations:
      - name: gethelm
        method: GET
        description: Get helm by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: edithelm
        method: PUT
        description: Edit helm
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletehelm
        method: DELETE
        description: Delete helm
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: helm-helmId-commit
      path: /helm/{helmId}/commit
      operations:
      - name: listhelmcommit
        method: GET
        description: List last helm commits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: helm-helmId-link
      path: /helm/{helmId}/link
      operations:
      - name: listhelmlinks
        method: GET
        description: List all URLs of the helm
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: helm-helmId-listServices
      path: /helm/{helmId}/listServices
      operations:
      - name: gethelmkubernetesservices
        method: GET
        description: Get helm kubernetes services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: helm-helmId-status
      path: /helm/{helmId}/status
      operations:
      - name: gethelmstatus
        method: GET
        description: Get helm status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.QOVERY_API_KEY}}'
  exposes:
  - type: rest
    namespace: qovery-helm-main-calls-rest
    port: 8080
    description: REST adapter for Qovery API — Helm Main Calls. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/helm/{helmid}
      name: helm-helmid
      description: REST surface for helm-helmId.
      operations:
      - method: GET
        name: gethelm
        description: Get helm by ID
        call: qovery-helm-main-calls.gethelm
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: edithelm
        description: Edit helm
        call: qovery-helm-main-calls.edithelm
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletehelm
        description: Delete helm
        call: qovery-helm-main-calls.deletehelm
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/helm/{helmid}/commit
      name: helm-helmid-commit
      description: REST surface for helm-helmId-commit.
      operations:
      - method: GET
        name: listhelmcommit
        description: List last helm commits
        call: qovery-helm-main-calls.listhelmcommit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/helm/{helmid}/link
      name: helm-helmid-link
      description: REST surface for helm-helmId-link.
      operations:
      - method: GET
        name: listhelmlinks
        description: List all URLs of the helm
        call: qovery-helm-main-calls.listhelmlinks
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/helm/{helmid}/listservices
      name: helm-helmid-listservices
      description: REST surface for helm-helmId-listServices.
      operations:
      - method: GET
        name: gethelmkubernetesservices
        description: Get helm kubernetes services
        call: qovery-helm-main-calls.gethelmkubernetesservices
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/helm/{helmid}/status
      name: helm-helmid-status
      description: REST surface for helm-helmId-status.
      operations:
      - method: GET
        name: gethelmstatus
        description: Get helm status
        call: qovery-helm-main-calls.gethelmstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: qovery-helm-main-calls-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qovery API — Helm Main Calls. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-helm-id
      description: Get helm by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qovery-helm-main-calls.gethelm
      outputParameters:
      - type: object
        mapping: $.
    - name: edit-helm
      description: Edit helm
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: qovery-helm-main-calls.edithelm
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-helm
      description: Delete helm
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: qovery-helm-main-calls.deletehelm
      outputParameters:
      - type: object
        mapping: $.
    - name: list-last-helm-commits
      description: List last helm commits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qovery-helm-main-calls.listhelmcommit
      outputParameters:
      - type: object
        mapping: $.
    - name: list-all-urls-helm
      description: List all URLs of the helm
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qovery-helm-main-calls.listhelmlinks
      outputParameters:
      - type: object
        mapping: $.
    - name: get-helm-kubernetes-services
      description: Get helm kubernetes services
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qovery-helm-main-calls.gethelmkubernetesservices
      outputParameters:
      - type: object
        mapping: $.
    - name: get-helm-status
      description: Get helm status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qovery-helm-main-calls.gethelmstatus
      outputParameters:
      - type: object
        mapping: $.
