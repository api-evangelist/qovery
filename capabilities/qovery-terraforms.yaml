    resources:
    - path: /v1/defaultterraformadvancedsettings
      name: defaultterraformadvancedsettings
      description: REST surface for defaultTerraformAdvancedSettings.
      operations:
      - method: GET
        name: getdefaultterraformadvancedsettings
        description: List default terraform advanced settings
        call: qovery-terraforms.getdefaultterraformadvancedsettings
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/environment/{environmentid}/terraform
      name: environment-environmentid-terraform
      description: REST surface for environment-environmentId-terraform.
      operations:
      - method: GET
        name: listterraforms
        description: List terraforms
        call: qovery-terraforms.listterraforms
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createterraform
        description: Create a terraform
        call: qovery-terraforms.createterraform
