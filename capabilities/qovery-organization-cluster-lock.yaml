naftiko: 1.0.0-alpha2
info:
  label: Qovery API — Organization Cluster Lock
  description: 'Qovery API — Organization Cluster Lock. 1 operations. Lead operation: List locked Cluster by organization.
    Self-contained Naftiko capability covering one Qovery business surface.'
  tags:
  - Qovery
  - Organization Cluster Lock
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QOVERY_API_KEY: QOVERY_API_KEY
capability:
  consumes:
  - type: http
    namespace: qovery-organization-cluster-lock
    baseUri: https://api.qovery.com
    description: Qovery API — Organization Cluster Lock business capability. Self-contained, no shared references.
    resources:
    - name: organization-organizationId-lock
      path: /organization/{organizationId}/lock
      operations:
      - name: listclusterlock
        method: GET
        description: List locked Cluster by organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.QOVERY_API_KEY}}'
  exposes:
  - type: rest
    namespace: qovery-organization-cluster-lock-rest
    port: 8080
    description: REST adapter for Qovery API — Organization Cluster Lock. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/organization/{organizationid}/lock
      name: organization-organizationid-lock
      description: REST surface for organization-organizationId-lock.
      operations:
      - method: GET
        name: listclusterlock
        description: List locked Cluster by organization
        call: qovery-organization-cluster-lock.listclusterlock
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: qovery-organization-cluster-lock-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qovery API — Organization Cluster Lock. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-locked-cluster-organization
      description: List locked Cluster by organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qovery-organization-cluster-lock.listclusterlock
      outputParameters:
      - type: object
        mapping: $.
