naftiko: 1.0.0-alpha2
info:
  label: Qovery API — Helm Actions
  description: 'Qovery API — Helm Actions. 4 operations. Lead operation: Deploy helm. Self-contained Naftiko capability covering
    one Qovery business surface.'
  tags:
  - Qovery
  - Helm Actions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QOVERY_API_KEY: QOVERY_API_KEY
capability:
  consumes:
  - type: http
    namespace: qovery-helm-actions
    baseUri: https://api.qovery.com
    description: Qovery API — Helm Actions business capability. Self-contained, no shared references.
    resources:
    - name: helm-helmId-deploy
      path: /helm/{helmId}/deploy
      operations:
      - name: deployhelm
        method: POST
        description: Deploy helm
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: forceEvent
          in: query
          type: string
          description: 'When filled, it indicates the target event to be deployed.  '
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: helm-helmId-redeploy
      path: /helm/{helmId}/redeploy
      operations:
      - name: redeployhelm
        method: POST
        description: Redeploy helm
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: forceEvent
          in: query
          type: string
          description: 'When filled, it indicates the target event to be deployed.  '
    - name: helm-helmId-stop
      path: /helm/{helmId}/stop
      operations:
      - name: stophelm
        method: POST
        description: Stop helm
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: helm-helmId-uninstall
      path: /helm/{helmId}/uninstall
      operations:
      - name: uninstallhelm
        method: POST
        description: Uninstall helm
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.QOVERY_API_KEY}}'
  exposes:
  - type: rest
    namespace: qovery-helm-actions-rest
    port: 8080
    description: REST adapter for Qovery API — Helm Actions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/helm/{helmid}/deploy
      name: helm-helmid-deploy
      description: REST surface for helm-helmId-deploy.
      operations:
      - method: POST
        name: deployhelm
        description: Deploy helm
        call: qovery-helm-actions.deployhelm
        with:
          forceEvent: rest.forceEvent
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/helm/{helmid}/redeploy
      name: helm-helmid-redeploy
      description: REST surface for helm-helmId-redeploy.
      operations:
      - method: POST
        name: redeployhelm
        description: Redeploy helm
        call: qovery-helm-actions.redeployhelm
        with:
          forceEvent: rest.forceEvent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/helm/{helmid}/stop
      name: helm-helmid-stop
      description: REST surface for helm-helmId-stop.
      operations:
      - method: POST
        name: stophelm
        description: Stop helm
        call: qovery-helm-actions.stophelm
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/helm/{helmid}/uninstall
      name: helm-helmid-uninstall
      description: REST surface for helm-helmId-uninstall.
      operations:
      - method: POST
        name: uninstallhelm
        description: Uninstall helm
        call: qovery-helm-actions.uninstallhelm
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: qovery-helm-actions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qovery API — Helm Actions. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: deploy-helm
      description: Deploy helm
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-helm-actions.deployhelm
      with:
        forceEvent: tools.forceEvent
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: redeploy-helm
      description: Redeploy helm
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-helm-actions.redeployhelm
      with:
        forceEvent: tools.forceEvent
      outputParameters:
      - type: object
        mapping: $.
    - name: stop-helm
      description: Stop helm
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-helm-actions.stophelm
      outputParameters:
      - type: object
        mapping: $.
    - name: uninstall-helm
      description: Uninstall helm
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qovery-helm-actions.uninstallhelm
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
